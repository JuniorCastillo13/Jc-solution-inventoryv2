<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JC SOLUTION"/>
<meta name="theme-color" content="#060610"/>
<title>JC SOLUTION Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--card-solid:#131322;--card-border:#ffffff0a;
  --header:linear-gradient(160deg,#0e0e20,#16162e);
  --text:#f0f0fa;--sub:#7070a0;--muted:#40405a;
  --accent:#818cf8;--accent-grad:linear-gradient(135deg,#6366f1,#8b5cf6);
  --green-grad:linear-gradient(135deg,#059669,#10b981);
  --input-solid:#121220;--input-border:#ffffff0e;
  --nav:#0c0c1a;--nav-border:#ffffff0c;
  --btn2-solid:#141422;--btn2-border:#ffffff0e;
  --del-bg:#1f0e0e;--del-border:#ef444330;--del-text:#ef4444;
  --notif-bg:#1a1000;--notif-border:#f59e0b30;--notif-text:#fbbf24;
  --bar-bg:#1e1e30;--row-border:#ffffff06;
  --overlay:rgba(0,0,0,0.82);
  --radius:14px;--radius-sm:10px;--radius-full:999px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
.light{
  --bg:#eef0f8;--card-solid:#ffffff;--card-border:#ddddf0;
  --header:linear-gradient(160deg,#e8e8ff,#eaeafc);
  --text:#18183a;--sub:#5050a0;--muted:#9090bb;--accent:#5558e8;
  --input-solid:#ffffff;--input-border:#cccce8;--nav:#ffffff;--nav-border:#e0e0f0;
  --btn2-solid:#ebebfc;--btn2-border:#d4d4ee;
  --del-bg:#fff0f0;--del-border:#ef444440;--del-text:#dc2626;
  --notif-bg:#fffbeb;--notif-border:#f59e0b50;--notif-text:#92400e;
  --bar-bg:#e0e0f0;--row-border:#eaeaf8;--overlay:rgba(0,0,0,0.50);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;height:-webkit-fill-available;overflow:hidden;}
body{height:100%;height:-webkit-fill-available;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--text);transition:background .3s,color .3s;width:100%;max-width:100vw;}
::-webkit-scrollbar{display:none;}
#app{height:100%;height:-webkit-fill-available;display:flex;flex-direction:column;width:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bot));}
#sync-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:500;pointer-events:none;transition:opacity .4s;}
.sync-pill{margin:calc(var(--safe-top) + 8px) auto 0;width:fit-content;padding:5px 14px;border-radius:var(--radius-full);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px);}
.sync-saving{background:#1a1a3a;border:1px solid #6366f140;color:#818cf8;}
.sync-ok{background:#0a200e;border:1px solid #10b98140;color:#34d399;}
.sync-err{background:#2a0a0a;border:1px solid #ef444440;color:#f87171;}
.sync-offline{background:#2a1a00;border:1px solid #f59e0b40;color:#fbbf24;}
#login-screen{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#05050e 0%,#0d0d22 50%,#080816 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;width:100%;}
.login-glow{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,#6366f130 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none;}
.login-logo-wrap{text-align:center;margin-bottom:36px;z-index:1;}
.login-brand{font-size:13px;letter-spacing:4px;color:#818cf8;text-transform:uppercase;font-weight:800;margin-bottom:8px;}
.login-title{font-size:30px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1.1;}
.login-title span{background:linear-gradient(135deg,#818cf8,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:13px;color:#5050a0;margin-top:6px;}
.login-card{width:100%;max-width:360px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px 24px;z-index:1;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.login-field-label{font-size:11px;color:#5050a0;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
.login-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:12px;padding:13px 16px;color:#f0f0fa;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;margin-bottom:16px;transition:border-color .2s;}
.login-input:focus{border-color:#6366f1;}.login-input::placeholder{color:#404060;}
.login-error{color:#f87171;font-size:13px;font-weight:600;text-align:center;margin-bottom:14px;min-height:20px;}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .15s;margin-top:4px;}
.login-btn:active{transform:scale(.97);}
.login-footer{font-size:11px;color:#30305a;text-align:center;margin-top:20px;z-index:1;}
.user-select-row{display:flex;gap:10px;margin-bottom:20px;}
.user-chip{flex:1;padding:10px 8px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#7070a0;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;}
.user-chip.selected{background:rgba(99,102,241,0.2);border-color:#6366f1;color:#a5b4fc;font-weight:700;}
.header{background:var(--header);padding:calc(var(--safe-top)+18px) 20px 16px;border-bottom:1px solid var(--card-border);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.logo{font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;font-weight:800;}
.title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-top:2px;}
.subtitle{font-size:13px;color:var(--sub);margin-top:1px;}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;}
.header-btns{display:flex;gap:8px;align-items:center;}
.btn-circle{width:38px;height:38px;border-radius:50%;border:1px solid var(--btn2-border);background:var(--btn2-solid);color:var(--sub);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;position:relative;}
.btn-circle:active{transform:scale(.92);}
.btn-circle.accent{background:var(--accent-grad);border:none;color:#fff;box-shadow:0 4px 15px #6366f155;font-size:22px;}
.btn-circle .badge{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:#f59e0b;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.btn{padding:11px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:transform .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.96);}
.btn-accent{background:var(--accent-grad);color:#fff;box-shadow:0 4px 14px #6366f145;}
.btn-green{background:var(--green-grad);color:#fff;}
.btn-orange{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;}
.btn-secondary{background:var(--btn2-solid);border:1px solid var(--btn2-border);color:var(--sub);}
.btn-delete{background:var(--del-bg);border:1px solid var(--del-border);color:var(--del-text);}
.btn-full{width:100%;}.btn-row{display:flex;gap:10px;margin-top:10px;}
.back-btn{background:var(--btn2-solid);border:1px solid var(--btn2-border);color:var(--sub);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.search-wrap{padding:12px 16px 6px;position:relative;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-input{width:100%;background:var(--input-solid);border:1px solid var(--input-border);border-radius:var(--radius);padding:11px 14px 11px 40px;color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none;}
.search-input::placeholder{color:var(--muted);}
.chips{display:flex;gap:8px;padding:8px 16px 10px;overflow-x:auto;scrollbar-width:none;}
.chip{padding:6px 14px;border-radius:var(--radius-full);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid var(--btn2-border);background:var(--btn2-solid);color:var(--sub);transition:all .2s;}
.chip.active{background:var(--accent-grad);border:none;color:#fff;font-weight:700;}
.list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card-solid);border-radius:var(--radius);border:1px solid var(--card-border);padding:14px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .15s;}
.card:active{transform:scale(.98);}
.card-icon{width:46px;height:46px;border-radius:12px;background:var(--btn2-solid);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.card-icon img{width:100%;height:100%;object-fit:cover;}
.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.card-arrow{color:var(--muted);font-size:18px;margin-left:auto;flex-shrink:0;}
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-full);font-size:11px;font-weight:700;white-space:nowrap;}
.badge-status .dot{width:6px;height:6px;border-radius:50%;}
.s-activo{background:#d1fae5;color:#065f46;}.s-activo .dot{background:#10b981;}
.s-reparacion{background:#fef3c7;color:#92400e;}.s-reparacion .dot{background:#f59e0b;}
.s-inactivo{background:#fee2e2;color:#991b1b;}.s-inactivo .dot{background:#ef4444;}
.rs-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-full);font-size:11px;font-weight:700;white-space:nowrap;}
.rs-badge .dot{width:6px;height:6px;border-radius:50%;}
.rs-reparado{background:#d1fae5;color:#065f46;}.rs-reparado .dot{background:#10b981;}
.rs-pendiente{background:#fef3c7;color:#92400e;}.rs-pendiente .dot{background:#f59e0b;}
.rs-espera{background:#dbeafe;color:#1e40af;}.rs-espera .dot{background:#3b82f6;}
.rs-noreparado{background:#fee2e2;color:#991b1b;}.rs-noreparado .dot{background:#ef4444;}
.rs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.rs-btn{padding:11px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;border:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.rs-btn .rs-icon{font-size:22px;}
.rs-btn.rs-sel-reparado{background:#0a2e18;border-color:#10b981;color:#34d399;}
.rs-btn.rs-sel-pendiente{background:#2a1e00;border-color:#f59e0b;color:#fbbf24;}
.rs-btn.rs-sel-espera{background:#0a1a3a;border-color:#3b82f6;color:#93c5fd;}
.rs-btn.rs-sel-noreparado{background:#2a0a0a;border-color:#ef4444;color:#fca5a5;}
.rs-btn.rs-idle{background:var(--btn2-solid);border-color:var(--btn2-border);color:var(--sub);}
.info-card{background:var(--card-solid);border-radius:var(--radius);padding:18px;border:1px solid var(--card-border);margin-bottom:12px;}
.info-title{font-size:10px;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;font-weight:800;margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--row-border);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:13px;color:var(--sub);}
.info-value{font-size:13px;font-weight:600;text-align:right;max-width:58%;}
.repair-card{background:linear-gradient(135deg,#1a100020,#2a180008);border:1px solid #f59e0b25;border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.repair-title{font-size:10px;letter-spacing:2px;color:#f59e0b;text-transform:uppercase;font-weight:800;margin-bottom:12px;}
.price-big{font-size:30px;font-weight:900;color:#f59e0b;letter-spacing:-1px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav);border-top:1px solid var(--nav-border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom, 0px));transition:background .3s;z-index:20;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;font-family:inherit;transition:color .2s;}
.nav-btn.active{color:var(--accent);font-weight:700;}
.nav-icon{font-size:20px;}
.overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.modal{background:var(--card-solid);width:100%;max-width:430px;border-radius:24px 24px 0 0;padding:24px 22px calc(32px + var(--safe-bot));border:1px solid var(--card-border);max-height:88vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:900;margin-bottom:18px;}
.field{margin-bottom:14px;}
.field-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.field-label .req{color:var(--accent);}
.field-input,.field-select,.field-textarea{width:100%;background:var(--input-solid);border:1px solid var(--input-border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
.field-input::placeholder,.field-textarea::placeholder{color:var(--muted);}
.field-textarea{resize:none;height:80px;}
input[type=date]{color-scheme:dark;}.light input[type=date]{color-scheme:light;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-btn{padding:10px 6px;border-radius:var(--radius-sm);background:var(--btn2-solid);border:1px solid var(--btn2-border);color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s;}
.cat-btn.active{background:var(--accent-grad);border:none;color:#fff;font-weight:700;}
.cat-btn .cat-emoji{font-size:20px;display:block;margin-bottom:4px;}
.photo-area{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.photo-preview{width:72px;height:72px;border-radius:14px;overflow:hidden;background:var(--btn2-solid);border:2px dashed var(--input-border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:10px;gap:2px;flex-shrink:0;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-btns{display:flex;flex-direction:column;gap:8px;}
.notif-banner{margin:10px 16px 0;background:var(--notif-bg);border:1px solid var(--notif-border);border-radius:var(--radius);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hchip{padding:4px 11px;border-radius:var(--radius-full);font-size:11px;font-weight:700;}
.hc-asignacion{background:#1e3a5f;color:#93c5fd;}.hc-devolucion{background:#1a2e1e;color:#86efac;}
.hc-reparacion{background:#3a2a00;color:#fcd34d;}.hc-traslado{background:#2a1a3a;color:#c4b5fd;}
.hc-baja{background:#3a1a1a;color:#fca5a5;}.hc-otro{background:#1e1e30;color:#94a3b8;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-tile{border-radius:var(--radius);padding:16px 14px;}
.stat-tile .stat-num{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;margin-top:4px;}
.stat-tile .stat-label{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
.bar-track{width:90px;height:6px;border-radius:3px;background:var(--bar-bg);overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.export-row{display:flex;justify-content:flex-end;padding:4px 16px 8px;}
.export-btn{background:#0a200e;border:1px solid #10b98130;border-radius:var(--radius-sm);color:#34d399;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:inherit;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.qr-finder{width:100%;height:148px;background:#05050e;border-radius:var(--radius);border:2px solid #6366f118;display:flex;align-items:center;justify-content:center;margin-bottom:14px;position:relative;}
.qr-corner{position:absolute;width:18px;height:18px;border-color:#6366f1;border-style:solid;}
.emp-equip-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--row-border);cursor:pointer;}
.emp-equip-icon{width:40px;height:40px;border-radius:10px;background:var(--btn2-solid);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.emp-equip-icon img{width:100%;height:100%;object-fit:cover;}
.pb-safe{padding-bottom:calc(10px + var(--safe-bot));}
.user-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;border-radius:var(--radius-full);background:var(--btn2-solid);border:1px solid var(--btn2-border);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;}
.user-pill .avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-grad);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800;}
.online-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;}
.sec-div{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:800;padding:14px 0 8px;border-top:1px solid var(--row-border);margin-top:4px;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .2s ease-out;}
.spinning{animation:spin 1s linear infinite;display:inline-block;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-logo-wrap">
    <div class="login-brand">JC Solution</div>
    <div class="login-title"><span>Inventory</span><br>Management</div>
    <div class="login-sub">Sincronización en tiempo real ☁️</div>
  </div>
  <div class="login-card">
    <div class="login-field-label">Selecciona tu usuario</div>
    <div class="user-select-row">
      <button class="user-chip selected" id="chip-junior" onclick="selectLoginUser('junior')">👑 Junior</button>
      <button class="user-chip" id="chip-bryan" onclick="selectLoginUser('bryan')">👤 Bryan</button>
    </div>
    <div class="login-field-label">Contraseña</div>
    <input class="login-input" type="password" id="login-pin" placeholder="Ingresa tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">Ingresar →</button>
  </div>
  <div class="login-footer">JC SOLUTION Inventory · Firebase Realtime Sync</div>
</div>
<div id="app" style="display:none">
  <div id="sync-bar" style="opacity:0"></div>
  <div class="screen" id="screen-content"></div>
  <nav class="nav" id="bottom-nav"></nav>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,doc,setDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp=initializeApp({
  apiKey:"AIzaSyCCvRc8g4l-q8fIqrtArNUmVVftQfWsIAE",
  authDomain:"jc-solution-inventory-18327.firebaseapp.com",
  projectId:"jc-solution-inventory-18327",
  storageBucket:"jc-solution-inventory-18327.firebasestorage.app",
  messagingSenderId:"829226281887",
  appId:"1:829226281887:web:aff3ae42155b6588e8ebaa"
});
const db=getFirestore(fbApp);

let syncT;
function showSync(type,msg){
  const bar=document.getElementById("sync-bar");
  const ico={saving:"⟳ ",ok:"✓ ",err:"✕ ",offline:"⚡ "};
  bar.innerHTML=`<div class="sync-pill sync-${type}">${ico[type]||""}${msg}</div>`;
  bar.style.opacity="1";clearTimeout(syncT);
  if(type==="ok"||type==="offline")syncT=setTimeout(()=>{bar.style.opacity="0";},2500);
}

const NAV=[{id:"list",icon:"📦",label:"Equipos"},{id:"history",icon:"📋",label:"Historial"},{id:"employees",icon:"👥",label:"Empleados"},{id:"stats",icon:"📊",label:"Stats"}];

window.selectLoginUser=id=>{lus=id;document.getElementById("chip-junior").classList.toggle("selected",id==="junior");document.getElementById("chip-bryan").classList.toggle("selected",id==="bryan");document.getElementById("login-pin").value="";document.getElementById("login-pin").focus();};
window.doLogin=()=>{const pin=document.getElementById("login-pin").value.trim();const u=USERS[lus];if(pin===u.pin){cu=u;document.getElementById("login-screen").style.display="none";document.getElementById("app").style.display="flex";document.getElementById("login-error").textContent="";const p=localStorage.getItem("jcs_dark");if(p!==null)S.dark=p==="1";if(!S.dark)document.body.classList.add("light");startL();render();}else{document.getElementById("login-error").textContent="Contraseña incorrecta";document.getElementById("login-pin").value="";document.getElementById("login-pin").focus();}};

function startL(){
  showSync("saving","Conectando con Firebase...");
  const eU=onSnapshot(query(collection(db,"equipment"),orderBy("createdAt","asc")),s=>{S.equipment=s.docs.map(d=>({...d.data(),id:d.id}));S.loaded.eq=true;chkL();},e=>{console.error(e);showSync("err","Error equipos");});
  const mpU=onSnapshot(query(collection(db,"employees"),orderBy("createdAt","asc")),s=>{S.employees=s.docs.map(d=>({...d.data(),id:d.id}));S.loaded.emp=true;chkL();},e=>{console.error(e);showSync("err","Error empleados");});
  const hU=onSnapshot(query(collection(db,"history"),orderBy("createdAt","desc")),s=>{S.history=s.docs.map(d=>({...d.data(),id:d.id}));S.loaded.hist=true;chkL();},e=>{console.error(e);showSync("err","Error historial");});
  unsubs=[eU,mpU,hU];
}
function chkL(){if(S.loaded.eq&&S.loaded.emp&&S.loaded.hist){showSync("ok","Sincronizado ✓");render();}}

const today=()=>new Date().toISOString().split("T")[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
async function fsSet(col,id,data){
  showSync("saving","Guardando...");
  try{const c={};Object.entries({...data,updatedAt:serverTimestamp()}).forEach(([k,v])=>{c[k]=v===undefined?null:v;});await setDoc(doc(db,col,id),c);showSync("ok","Guardado ☁️");}
  catch(e){console.error(e);showSync("err","Error al guardar");}
}
async function fsDel(col,id){showSync("saving","...");try{await deleteDoc(doc(db,col,id));showSync("ok","Eliminado ☁️");}catch(e){console.error(e);showSync("err","Error");}}

const catBy=id=>CATS.find(c=>c.id===id)||{l:id,i:"🔧"};
const rsBy=id=>REPAIR_STATUS.find(r=>r.id===id)||null;
function sBadge(s){const m=STATUS[s]||{cls:"",dot:"#999"};return `<span class="badge-status ${m.cls}"><span class="dot"></span>${s}</span>`;}
function rsBadge(id){const r=rsBy(id);if(!r)return "";return `<span class="rs-badge ${r.cls}"><span class="dot"></span>${r.label}</span>`;}
function hchip(t){return `<span class="hchip ${HCHIP[t]||'hc-otro'}">${t}</span>`;}
function fmtP(p){if(!p&&p!==0)return "—";return "RD$ "+parseFloat(p).toLocaleString("es-DO",{minimumFractionDigits:2,maximumFractionDigits:2});}
function setScreen(s){S.screen=s;render();}window.setScreen=setScreen;
function showToast(msg,type="ok"){let el=document.getElementById("toast");if(!el){el=document.createElement("div");el.id="toast";document.body.appendChild(el);}const bg=type==="err"?"#7f1d1d":type==="info"?"#1a2a50":"#064e3b";el.textContent=msg;el.style.cssText=`position:fixed;top:calc(22px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px #00000060;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .4s;pointer-events:none;`;clearTimeout(el._t);el.style.opacity="1";el._t=setTimeout(()=>{el.style.opacity="0";},2500);}
window.showToast=showToast;
function toggleDark(){S.dark=!S.dark;document.body.classList.toggle("light");localStorage.setItem("jcs_dark",S.dark?"1":"0");render();}window.toggleDark=toggleDark;
function exportCSV(){const eq=filteredEq();const h=["Nombre","Cat","Marca","Modelo","Serie","Asignado","Estado","Estado Rep.","Falla","Precio Rep.","Fecha","Notas"];const rows=eq.map(e=>[e.nombre,catBy(e.cat).l,e.marca,e.modelo,e.serie,e.asignado,e.estado,rsBy(e.repairStatus)?.label||"",e.falla||"",e.repairPrice||"",e.fecha,e.notas]);const csv=[h,...rows].map(r=>r.map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="jcsolution.csv";a.click();showToast("📥 Exportando...");}window.exportCSV=exportCSV;

function filteredEq(){const q=S.search.toLowerCase();return S.equipment.filter(e=>(e.nombre.toLowerCase().includes(q)||e.asignado.toLowerCase().includes(q)||e.serie.toLowerCase().includes(q))&&(S.filterCat==="todos"||e.cat===S.filterCat));}

window.openNew=()=>{S.form={nombre:"",cat:"celular",marca:"",modelo:"",serie:"",asignado:"Sin asignar",empId:null,estado:"Activo",fecha:today(),notas:"",foto:null,falla:"",repairPrice:null,repairStatus:null};S.editingId=null;setScreen("form");};
window.openEdit=id=>{S.form={...S.equipment.find(e=>e.id===id)};S.editingId=id;setScreen("form");};
window.openDetail=id=>{S.selectedId=id;setScreen("detail");};
window.saveEquip=async()=>{const f=S.form;if(!f.nombre||!f.marca||!f.serie){showToast("Completa los campos obligatorios","err");return;}const id=S.editingId||uid();const ex=S.equipment.find(e=>e.id===id);await fsSet("equipment",id,{...f,id,createdAt:ex?.createdAt||serverTimestamp()});if(!S.editingId)addHist(id,"Asignación","Equipo registrado",f.nombre);S.selectedId=id;setScreen(S.editingId?"detail":"list");};
window.deleteEquip=async id=>{await fsDel("equipment",id);S.showDel=false;setScreen("list");};
window.setRepairStatus=async(eqId,rsId)=>{const eq=S.equipment.find(e=>e.id===eqId);if(!eq)return;const upd={...eq,repairStatus:rsId};if(rsId==="reparado")upd.estado="Activo";else if(rsId==="noreparado")upd.estado="Inactivo";else upd.estado="En reparación";await fsSet("equipment",eqId,upd);const r=rsBy(rsId);addHist(eqId,"Reparación","Estado: "+r?.label,eq.nombre);S.showRS=false;render();};window.setRepairStatus=window.setRepairStatus;

async function addHist(eqId,tipo,notas,equipo){await fsSet("history",uid(),{id:uid(),eqId,tipo,notas,equipo,fecha:today(),resp:cu?cu.nombre:"Admin",createdAt:serverTimestamp()});}
window.saveMove=async()=>{const eq=S.equipment.find(e=>e.id===S.selectedId);if(!eq)return;const tipo=S.moveForm.tipo;await addHist(eq.id,tipo,S.moveForm.notas||"Sin notas",eq.nombre);const map={Reparación:"En reparación",Baja:"Inactivo",Asignación:"Activo",Devolución:"Activo",Traslado:"Activo"};if(map[tipo])await fsSet("equipment",eq.id,{...eq,estado:map[tipo]});S.showMove=false;S.moveForm={tipo:"Asignación",notas:""};showToast(`📋 "${tipo}" registrado`);render();};
window.saveEmployee=async()=>{if(!S.empForm.nombre){showToast("El nombre es obligatorio","err");return;}const id=S.editingEmpId||uid();const ex=S.employees.find(e=>e.id===id);await fsSet("employees",id,{...S.empForm,id,createdAt:ex?.createdAt||serverTimestamp()});S.showEmpForm=false;S.empForm={};S.editingEmpId=null;render();};

function fField(label,key,ph,req=false,type="text"){const val=(S.form[key]||"").toString().replace(/"/g,"&quot;").replace(/</g,"&lt;");return `<div class="field"><div class="field-label">${label}${req?' <span class="req">*</span>':''}</div><input class="field-input" type="${type}" value="${val}" placeholder="${ph}" oninput="S.form['${key}']=this.value${type==='number'?';S.form["'+key+'"]=parseFloat(this.value)||null':''}"></div>`;}
function uPill(){if(!cu)return "";return `<div class="user-pill" onclick="S.showUserMenu=true;render()"><div class="avatar">${cu.ini}</div>${cu.nombre.split(" ")[0]}&nbsp;<span class="online-dot"></span></div>`;}
function rLoading(){return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px"><div style="font-size:40px" class="spinning">☁️</div><div style="font-size:15px;font-weight:700;color:var(--sub)">Cargando datos...</div></div>`;}

function rList(){
  if(!S.loaded.eq)return rLoading();
  const repairs=S.equipment.filter(e=>e.estado==="En reparación"&&!S.dismissed.includes(e.id));
  const nc=repairs.length;const eq=filteredEq();
  const bell=`<button class="btn-circle" onclick="S.showNotif=true;render()" style="${nc>0?'background:#f59e0b18;border-color:#f59e0b40;color:#f59e0b':''}">🔔${nc>0?`<span class="badge">${nc}</span>`:""}</button>`;
  const banner=nc>0&&!S.showNotif?`<div class="notif-banner" onclick="S.showNotif=true;render()"><div style="color:var(--notif-text);font-size:13px;font-weight:700">⚠️ ${nc} equipo${nc>1?"s":""} en reparación</div><div style="color:var(--accent);font-size:12px;font-weight:700">Ver →</div></div>`:"";
  const chps=[{id:"todos",l:"Todos",i:"📦"},...CATS].map(c=>`<button class="chip${S.filterCat===c.id?" active":""}" onclick="S.filterCat='${c.id}';render()">${c.i} ${c.l}</button>`).join("");
  const cards=eq.length===0?`<div class="empty"><div style="font-size:48px">📭</div><div style="margin-top:10px">Sin resultados</div></div>`:eq.map(item=>{const ph=item.foto?`<div class="card-icon"><img src="${item.foto}" alt=""></div>`:`<div class="card-icon">${catBy(item.cat).i}</div>`;return `<div class="card fade-in" onclick="openDetail('${item.id}')">${ph}<div style="flex:1;min-width:0"><div class="card-name">${item.nombre}</div><div class="card-sub">${item.marca} · ${item.asignado}</div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${sBadge(item.estado)}${item.repairStatus?rsBadge(item.repairStatus):""}</div></div><div class="card-arrow">›</div></div>`;}).join("");
  let nPanel="";
  if(S.showNotif){const items=repairs.length===0?`<div class="empty" style="padding:20px 0">✅ Sin alertas</div>`:repairs.map(e=>`<div style="background:var(--notif-bg);border:1px solid var(--notif-border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start"><div style="font-size:24px;flex-shrink:0">${catBy(e.cat).i}</div><div style="flex:1"><div style="font-weight:700;font-size:14px">${e.nombre}</div><div style="color:var(--notif-text);font-size:12px;margin-top:2px">🔧 ${e.falla||"En reparación"}</div>${e.repairPrice?`<div style="color:#f59e0b;font-size:12px;font-weight:700;margin-top:2px">💰 ${fmtP(e.repairPrice)}</div>`:""}${e.repairStatus?`<div style="margin-top:4px">${rsBadge(e.repairStatus)}</div>`:""}</div><div style="display:flex;flex-direction:column;gap:6px"><button class="btn btn-accent" style="padding:5px 10px;font-size:11px" onclick="S.showNotif=false;openDetail('${e.id}')">Ver</button><button style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit" onclick="S.dismissed.push('${e.id}');render()">Ignorar</button></div></div>`).join("");nPanel=`<div class="overlay" onclick="S.showNotif=false;render()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="modal-title" style="margin-bottom:0">🔔 En reparación</div><button style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer" onclick="S.showNotif=false;render()">✕</button></div>${items}${repairs.length>0?`<button class="btn btn-secondary btn-full" style="margin-top:4px" onclick="S.dismissed=[...S.dismissed,...[${repairs.map(r=>`'${r.id}'`).join(",")}]];render()">Ignorar todas</button>`:""}</div></div>`;}
  let uMenu="";if(S.showUserMenu){uMenu=`<div class="overlay" onclick="S.showUserMenu=false;render()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;align-items:center;gap:14px;margin-bottom:20px"><div style="width:52px;height:52px;border-radius:50%;background:var(--accent-grad);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff">${cu.ini}</div><div><div style="font-size:17px;font-weight:900">${cu.nombre}</div><div style="font-size:13px;color:var(--sub);margin-top:2px">${cu.rol==="admin"?"👑 Administrador":"👤 Usuario"}</div><div style="display:flex;align-items:center;gap:5px;margin-top:4px;font-size:12px;color:#10b981;font-weight:700"><span class="online-dot"></span>Conectado · Firebase</div></div></div><div class="btn-row"><button class="btn btn-secondary" style="flex:1" onclick="S.showUserMenu=false;render()">Cancelar</button><button class="btn btn-delete" style="flex:1" onclick="S.showUserMenu=false;logout()">🚪 Cerrar sesión</button></div></div></div>`;}
  return `<div class="header"><div class="header-row"><div><div class="logo">JC SOLUTION</div><div class="title">Inventory</div><div class="subtitle">${eq.length} de ${S.equipment.length} equipos</div></div><div class="header-btns">${uPill()}${bell}<button class="btn-circle" onclick="toggleDark()">${S.dark?"☀️":"🌙"}</button><button class="btn-circle accent" onclick="openNew()">＋</button></div></div></div>${banner}<div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Nombre, serie, responsable..." value="${S.search}" oninput="S.search=this.value;render()"></div><div class="chips">${chps}</div><div class="export-row"><button class="export-btn" onclick="exportCSV()">📥 Exportar (${eq.length})</button></div><div class="list pb-safe">${cards}</div>${nPanel}${uMenu}`;
}

  let mMod="";if(S.showMove){const tOpts=MOVE_TYPES.map(t=>`<option${S.moveForm.tipo===t?" selected":""}>${t}</option>`).join("");mMod=`<div class="overlay" onclick="S.showMove=false;render()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">📋 Registrar movimiento</div><div class="field"><div class="field-label">Tipo</div><select class="field-select" onchange="S.moveForm.tipo=this.value">${tOpts}</select></div><div class="field"><div class="field-label">Notas</div><textarea class="field-textarea" placeholder="Descripción..." oninput="S.moveForm.notas=this.value">${S.moveForm.notas}</textarea></div><div class="btn-row"><button class="btn btn-secondary" style="flex:1" onclick="S.showMove=false;render()">Cancelar</button><button class="btn btn-accent" style="flex:1" onclick="saveMove()">Guardar</button></div></div></div>`;}
  let rsMod="";if(S.showRS){const btns=REPAIR_STATUS.map(r=>{const sel=item.repairStatus===r.id;return `<button class="rs-btn ${sel?r.sel:'rs-idle'}" onclick="setRepairStatus('${item.id}','${r.id}')"><span class="rs-icon">${r.icon}</span>${r.label}</button>`;}).join("");rsMod=`<div class="overlay" onclick="S.showRS=false;render()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="modal-title" style="margin-bottom:0">🔧 Estado de reparación</div><button style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer" onclick="S.showRS=false;render()">✕</button></div><div style="font-size:13px;color:var(--sub);margin-bottom:14px">Selecciona el estado. Se actualizará automáticamente.</div><div class="rs-grid">${btns}</div><button class="btn btn-secondary btn-full" style="margin-top:12px" onclick="S.showRS=false;render()">Cancelar</button></div></div>`;}
  return `<div style="background:var(--header);padding:calc(var(--safe-top)+18px) 20px 20px;border-bottom:1px solid var(--card-border)"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><button class="back-btn" onclick="setScreen('list')">‹ Volver</button><button class="btn-circle" onclick="toggleDark()" style="width:34px;height:34px;font-size:15px">${S.dark?"☀️":"🌙"}</button></div><div style="display:flex;align-items:center;gap:14px">${ph}<div><div style="font-size:20px;font-weight:900">${item.nombre}</div><div style="font-size:13px;color:var(--sub);margin-top:2px">${catBy(item.cat).l} · ${item.marca}</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${sBadge(item.estado)}${item.repairStatus?rsBadge(item.repairStatus):""}</div></div></div></div><div style="padding:18px 20px 120px"><div class="info-card"><div class="info-title">Información del equipo</div><div class="info-row"><span class="info-label">Modelo</span><span class="info-value">${item.modelo||"—"}</span></div><div class="info-row"><span class="info-label">No. serie</span><span class="info-value" style="font-family:monospace">${item.serie||"—"}</span></div><div class="info-row"><span class="info-label">Fecha</span><span class="info-value">${item.fecha||"—"}</span></div><div class="info-row"><span class="info-label">Responsable</span><span class="info-value">${item.asignado||"Sin asignar"}</span></div></div>${repCard}${item.notas?`<div class="info-card"><div class="info-title">Notas</div><p style="font-size:13px;color:var(--sub);line-height:1.7">${item.notas}</p></div>`:""}${ih.length>0?`<div class="info-card"><div class="info-title">Últimos movimientos</div>${histH}</div>`:""}   <div class="btn-row"><button class="btn btn-green" style="flex:1" onclick="S.moveForm={tipo:'Asignación',notas:''};S.showMove=true;render()">📋 Movimiento</button></div><div class="btn-row"><button class="btn btn-accent" style="flex:1" onclick="openEdit('${item.id}')">✏️ Editar</button><button class="btn btn-delete" style="padding:11px 16px" onclick="S.showDel=true;render()">🗑️</button></div></div>${dMod}${mMod}${rsMod}`;
}

function rForm(){
  const f=S.form;
  const cgrid=CATS.map(c=>`<button class="cat-btn${f.cat===c.id?" active":""}" onclick="S.form.cat='${c.id}';render()"><span class="cat-emoji">${c.i}</span>${c.l}</button>`).join("");
  const empOpts=`<option value="">Sin asignar</option>`+S.employees.filter(e=>e.activo).map(e=>`<option value="${e.id}"${f.empId===e.id?" selected":""}>${e.nombre} — ${e.cargo}</option>`).join("");
  const stOpts=Object.keys(STATUS).map(s=>`<option${f.estado===s?" selected":""}>${s}</option>`).join("");
  const pPrev=f.foto?`<div class="photo-preview"><img src="${f.foto}" alt=""></div>`:`<div class="photo-preview"><span style="font-size:24px">📷</span>Sin foto</div>`;
  const rsBtns=REPAIR_STATUS.map(r=>{const sel=f.repairStatus===r.id;return `<button class="rs-btn ${sel?r.sel:'rs-idle'}" onclick="S.form.repairStatus=S.form.repairStatus==='${r.id}'?null:'${r.id}';render()"><span class="rs-icon">${r.icon}</span>${r.label}</button>`;}).join("");
  let qMod="";if(S.showQR){qMod=`<div class="overlay" onclick="S.showQR=false;render()"><div class="modal" onclick="event.stopPropagation()"><div style="text-align:center;margin-bottom:16px"><div style="font-size:36px">📷</div><div style="font-size:17px;font-weight:800;margin-top:6px">Escanear QR</div></div><div class="qr-finder">${S.scanning?`<div style="text-align:center"><div style="font-size:28px" class="spinning">⟳</div><div style="font-size:12px;color:#6366f1;margin-top:8px">Escaneando...</div></div>`:`<div style="width:100px;height:100px;position:relative"><div class="qr-corner" style="top:0;left:0;border-width:3px 0 0 3px"></div><div class="qr-corner" style="top:0;right:0;border-width:3px 3px 0 0"></div><div class="qr-corner" style="bottom:0;left:0;border-width:0 0 3px 3px"></div><div class="qr-corner" style="bottom:0;right:0;border-width:0 3px 3px 0"></div></div>`}</div><button class="btn btn-accent btn-full" style="margin-bottom:12px" onclick="if(S.scanning)return;S.scanning=true;render();setTimeout(()=>{S.scanning=false;const l='ABCDEFGHIJKLMNOPQRSTUVWXYZ';S.qrInput='SN-'+(Math.floor(Math.random()*9000)+1000)+'-'+l[Math.floor(Math.random()*26)]+l[Math.floor(Math.random()*26)];render();},1800)">${S.scanning?"Escaneando...":"📷 Simular escaneo"}</button><div class="field-label">O ingresa manualmente</div><input class="field-input" style="margin-bottom:14px" placeholder="SN-2024-001" value="${S.qrInput}" oninput="S.qrInput=this.value"><div class="btn-row"><button class="btn btn-secondary" style="flex:1" onclick="S.showQR=false;render()">Cancelar</button><button class="btn btn-accent" style="flex:1" onclick="if(S.qrInput.trim()){S.form.serie=S.qrInput.trim();S.showQR=false;showToast('Código cargado');render();}">✅ Usar código</button></div></div></div>`;}
  return `<div style="background:var(--header);padding:calc(var(--safe-top)+18px) 20px 14px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:10px"><button class="back-btn" onclick="setScreen(S.editingId?'detail':'list')">‹</button><div style="font-size:18px;font-weight:900">${S.editingId?"Editar equipo":"Nuevo equipo"}</div>${!S.editingId?`<button class="btn btn-secondary" style="margin-left:auto;padding:6px 12px;font-size:12px;border-radius:8px" onclick="S.showQR=true;S.qrInput='';render()">📷 QR</button>`:""}</div>
  <div style="padding:16px 20px 120px;display:flex;flex-direction:column;gap:4px">
    <div class="field"><div class="field-label">Foto del equipo</div><div class="photo-area">${pPrev}<div class="photo-btns"><button class="btn btn-accent" style="padding:8px 16px;font-size:13px" onclick="document.getElementById('photo-input').click()">${f.foto?"Cambiar":"Subir foto"}</button>${f.foto?`<button class="btn btn-delete" style="padding:8px 16px;font-size:13px" onclick="S.form.foto=null;render()">Eliminar</button>`:""}</div></div><input id="photo-input" type="file" accept="image/*" style="display:none" onchange="const file=this.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{S.form.foto=e.target.result;render();};r.readAsDataURL(file);"></div>
    <div class="field"><div class="field-label">Categoría</div><div class="cat-grid">${cgrid}</div></div>
    ${fField("Nombre del equipo","nombre","Ej. iPhone 15 Pro",true)}
    ${fField("Marca","marca","Apple, Samsung, Dell...",true)}
    ${fField("Modelo","modelo","Ej. A2890")}
    ${fField("Número de serie","serie","Ej. SN-2024-001",true)}
    <div class="field"><div class="field-label">Asignar a empleado</div><select class="field-select" onchange="const id=this.value;const emp=S.employees.find(e=>e.id===id);S.form.empId=id||null;S.form.asignado=emp?emp.nombre:'Sin asignar';">${empOpts}</select></div>
    <div class="field"><div class="field-label">Estado general</div><select class="field-select" onchange="S.form.estado=this.value">${stOpts}</select></div>
    <div class="field"><div class="field-label">Fecha de registro</div><input class="field-input" type="date" value="${f.fecha||""}" onchange="S.form.fecha=this.value"></div>
    <div class="sec-div">🔧 Sección de Reparación</div>
    <div class="field"><div class="field-label">Falla del equipo</div><textarea class="field-textarea" placeholder="Describe la falla o problema del equipo..." oninput="S.form.falla=this.value">${f.falla||""}</textarea></div>
    <div class="field"><div class="field-label">Precio de reparación (RD$)</div><input class="field-input" type="number" inputmode="decimal" placeholder="Ej. 2500.00" value="${f.repairPrice||""}" oninput="S.form.repairPrice=parseFloat(this.value)||null"></div>
    <div class="field"><div class="field-label">Estado de reparación</div><div class="rs-grid">${rsBtns}</div></div>
    <div class="sec-div">📝 Notas adicionales</div>
    <div class="field"><textarea class="field-textarea" placeholder="Observaciones, accesorios..." oninput="S.form.notas=this.value">${f.notas||""}</textarea></div>
    <button class="btn btn-accent btn-full" style="margin-top:8px;padding:14px;font-size:15px" onclick="saveEquip()">${S.editingId?"💾 Guardar cambios":"✅ Registrar equipo"}</button>
  </div>${qMod}`;
}

function rHistory(){
  if(!S.loaded.hist)return rLoading();
  const fh=S.histFilter==="todos"?S.history:S.history.filter(h=>h.tipo===S.histFilter);
  const chps=["todos",...MOVE_TYPES].map(t=>`<button class="chip${S.histFilter===t?" active":""}" onclick="S.histFilter='${t}';render()">${t==="todos"?"📋 Todos":t}</button>`).join("");
  const cards=fh.length===0?`<div class="empty"><div style="font-size:48px">📭</div><div style="margin-top:10px">Sin movimientos</div></div>`:fh.map(h=>`<div class="card fade-in" style="flex-direction:column;align-items:flex-start;gap:8px;cursor:default"><div style="display:flex;justify-content:space-between;width:100%;align-items:center">${hchip(h.tipo)}<span style="font-size:11px;color:var(--muted)">${h.fecha}</span></div><div style="font-size:14px;font-weight:700">${h.equipo}</div><div style="font-size:13px;color:var(--sub)">${h.notas}</div><div style="font-size:12px;color:var(--muted)">Por: ${h.resp}</div></div>`).join("");
  return `<div class="header"><div class="logo">JC SOLUTION</div><div class="title">Historial</div><div class="subtitle">${S.history.length} movimientos · en tiempo real</div></div><div class="chips">${chps}</div><div class="list pb-safe">${cards}</div>`;
}

function rEmployees(){
  if(!S.loaded.emp)return rLoading();
  const addBtn=`<button class="btn-circle accent" onclick="S.empForm={nombre:'',cargo:'',depto:'',email:'',activo:true};S.editingEmpId=null;S.showEmpForm=true;render()">＋</button>`;
  const cards=S.employees.map(emp=>{const cnt=S.equipment.filter(e=>e.empId===emp.id).length;return `<div class="card fade-in" onclick="S.empDetailId='${emp.id}';setScreen('empdetail')"><div class="card-icon" style="background:${emp.activo?(S.dark?"#1a2a3a":"#ddeeff"):(S.dark?"#2a1a1a":"#ffeeee")}">${emp.activo?"👤":"👻"}</div><div style="flex:1;min-width:0"><div class="card-name">${emp.nombre}</div><div class="card-sub">${emp.cargo} · ${emp.depto}</div><div style="font-size:12px;color:${cnt>0?"var(--accent)":"var(--muted)"};margin-top:4px;font-weight:${cnt>0?700:400}">${cnt} equipo${cnt!==1?"s":""} asignado${cnt!==1?"s":""}${!emp.activo?` <span style="color:#ef4444">· Inactivo</span>`:""}</div></div><button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;flex-shrink:0" onclick="event.stopPropagation();S.empForm={...S.employees.find(e=>e.id==='${emp.id}')};S.editingEmpId='${emp.id}';S.showEmpForm=true;render()">Editar</button></div>`;}).join("");
  let eMod="";if(S.showEmpForm){const f=S.empForm;eMod=`<div class="overlay" onclick="S.showEmpForm=false;render()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">${S.editingEmpId?"Editar empleado":"Nuevo empleado"}</div><div class="field"><div class="field-label">Nombre <span class="req">*</span></div><input class="field-input" value="${f.nombre||""}" placeholder="Nombre" oninput="S.empForm.nombre=this.value"></div><div class="field"><div class="field-label">Cargo</div><input class="field-input" value="${f.cargo||""}" placeholder="Ej. Técnico" oninput="S.empForm.cargo=this.value"></div><div class="field"><div class="field-label">Departamento</div><input class="field-input" value="${f.depto||""}" placeholder="Ej. Tecnología" oninput="S.empForm.depto=this.value"></div><div class="field"><div class="field-label">Correo</div><input class="field-input" value="${f.email||""}" placeholder="correo@empresa.com" oninput="S.empForm.email=this.value"></div><div class="field"><div class="field-label">Estado</div><select class="field-select" onchange="S.empForm.activo=this.value==='activo'"><option value="activo"${f.activo?" selected":""}>Activo</option><option value="inactivo"${!f.activo?" selected":""}>Inactivo</option></select></div><div class="btn-row"><button class="btn btn-secondary" style="flex:1" onclick="S.showEmpForm=false;render()">Cancelar</button><button class="btn btn-accent" style="flex:1" onclick="saveEmployee()">Guardar</button></div></div></div>`;}
  return `<div class="header"><div class="header-row"><div><div class="logo">JC SOLUTION</div><div class="title">Empleados</div><div class="subtitle">${S.employees.filter(e=>e.activo).length} activos</div></div><div class="header-btns">${addBtn}</div></div></div><div class="list" style="padding-top:12px">${cards}</div>${eMod}`;
}

function rEmpDetail(){
  const emp=S.employees.find(e=>e.id===S.empDetailId);if(!emp){setScreen("employees");return "";}
  const ee=S.equipment.filter(e=>e.empId===emp.id);
  const rows=ee.length===0?`<div class="empty" style="padding:20px 0"><div style="font-size:32px">📭</div><div style="margin-top:8px;font-size:13px">Sin equipos asignados</div></div>`:ee.map(item=>`<div class="emp-equip-row" onclick="openDetail('${item.id}')"><div class="emp-equip-icon">${item.foto?`<img src="${item.foto}" alt="">`:catBy(item.cat).i}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.nombre}</div><div style="font-size:12px;color:var(--sub)">${item.marca} · ${item.serie}</div></div>${sBadge(item.estado)}</div>`).join("");
  return `<div style="background:var(--header);padding:calc(var(--safe-top)+18px) 20px 20px;border-bottom:1px solid var(--card-border)"><button class="back-btn" onclick="setScreen('employees')" style="margin-bottom:14px">‹ Volver</button><div style="display:flex;align-items:center;gap:14px"><div style="width:60px;height:60px;border-radius:18px;background:${emp.activo?(S.dark?"#1a2a3a":"#ddeeff"):(S.dark?"#2a1a1a":"#ffeeee")};display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0">${emp.activo?"👤":"👻"}</div><div><div style="font-size:20px;font-weight:900">${emp.nombre}</div><div style="font-size:13px;color:var(--sub);margin-top:2px">${emp.cargo} · ${emp.depto}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${emp.email}</div></div></div></div><div style="padding:18px 20px 120px"><div class="info-card"><div class="info-title">Equipos asignados (${ee.length})</div>${rows}</div><button class="btn btn-accent btn-full" onclick="S.empForm={...S.employees.find(e=>e.id==='${emp.id}')};S.editingEmpId='${emp.id}';S.showEmpForm=true;setScreen('employees')">✏️ Editar empleado</button></div>`;
}

function rStats(){
  const eq=S.equipment;
  const rCnts={};REPAIR_STATUS.forEach(r=>{rCnts[r.id]=eq.filter(e=>e.repairStatus===r.id).length;});
  const totalRev=eq.filter(e=>e.repairPrice).reduce((s,e)=>s+(parseFloat(e.repairPrice)||0),0);
  const tiles=[{label:"Total equipos",val:eq.length,icon:"📦",g:"linear-gradient(135deg,#6366f1,#8b5cf6)"},{label:"Activos",val:eq.filter(e=>e.estado==="Activo").length,icon:"✅",g:"linear-gradient(135deg,#059669,#10b981)"},{label:"En reparación",val:eq.filter(e=>e.estado==="En reparación").length,icon:"🔧",g:"linear-gradient(135deg,#d97706,#f59e0b)"},{label:"Empleados",val:S.employees.filter(e=>e.activo).length,icon:"👤",g:"linear-gradient(135deg,#db2777,#ec4899)"}].map(s=>`<div class="stat-tile" style="background:${s.g}"><div style="font-size:26px">${s.icon}</div><div class="stat-num">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join("");
  const stRows=Object.entries(STATUS).map(([s,m])=>{const cnt=eq.filter(e=>e.estado===s).length;const pct=eq.length?(cnt/eq.length*100):0;return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0"><div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:${m.dot};display:block"></span><span style="font-size:14px">${s}</span></div><div style="display:flex;align-items:center;gap:10px"><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${m.dot}"></div></div><span style="font-size:16px;font-weight:800;min-width:22px;text-align:right">${cnt}</span></div></div>`;}).join("");
  const rsRows=REPAIR_STATUS.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${r.icon}</span><span style="font-size:14px">${r.label}</span></div><span style="font-size:15px;font-weight:800">${rCnts[r.id]||0}</span></div>`).join("");
  const rMoves=S.history.slice(0,4).map(h=>`<div class="info-row" style="gap:8px">${hchip(h.tipo)}<span style="font-size:12px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.equipo}</span><span style="font-size:11px;color:var(--muted);flex-shrink:0">${h.fecha}</span></div>`).join("");
  return `<div class="header"><div class="logo">JC SOLUTION</div><div class="title">Estadísticas</div><div class="subtitle">Resumen del inventario · en vivo</div></div>
  <div style="padding:16px 16px 120px">
    <div class="stats-grid">${tiles}</div>
    ${totalRev>0?`<div class="repair-card" style="margin-bottom:14px"><div class="repair-title">💰 Ingresos por reparación</div><div class="price-big">${fmtP(totalRev)}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${eq.filter(e=>e.repairPrice).length} equipos con precio de reparación</div></div>`:""}
    <div class="info-card"><div class="info-title">Por estado</div>${stRows}</div>
    <div class="info-card"><div class="info-title">Estado de reparaciones</div>${rsRows}</div>
    <div class="info-card"><div class="info-title">Movimientos recientes</div>${rMoves}</div>
  </div>`;
}

function aN(){if(["detail","form"].includes(S.screen))return "list";if(S.screen==="empdetail")return "employees";return S.screen;}
window.render=function(){
  if(!S.dark)document.body.classList.add("light");else document.body.classList.remove("light");
  const sc={list:rList,detail:rDetail,form:rForm,history:rHistory,employees:rEmployees,empdetail:rEmpDetail,stats:rStats};
  document.getElementById("screen-content").innerHTML=(sc[S.screen]||rList)();
  const an=aN();
  document.getElementById("bottom-nav").innerHTML=NAV.map(n=>`<button class="nav-btn${an===n.id?" active":""}" onclick="setScreen('${n.id}')"><span class="nav-icon">${n.icon}</span>${n.label}</button>`).join("");
  document.getElementById("screen-content").scrollTop=0;
};
window.S=S;
window.addEventListener("online",()=>showSync("ok","Conexión restaurada ✓"));
window.addEventListener("offline",()=>showSync("offline","Sin conexión · modo offline"));
</script>
</body>
</html>
